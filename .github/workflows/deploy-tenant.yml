name: Deploy Tenant via Webhook

# Déclenchement manuel depuis l'interface GitHub Actions
# Secrets requis dans le repo adminKlassci :
#   DEPLOY_WEBHOOK_TOKEN  → Token secret (généré avec openssl rand -hex 32)
#   DEPLOY_WEBHOOK_URL    → https://admin.klassci.com/api/deploy
#
# Ces secrets doivent aussi être définis dans le .env du serveur :
#   DEPLOY_WEBHOOK_TOKEN=<même valeur>

on:
  workflow_dispatch:
    inputs:
      tenant_code:
        description: "Code du tenant à déployer (ex: esbtp-abidjan) — laisser vide pour tous les tenants actifs"
        required: false
        default: ""
      branch:
        description: "Branche Git à déployer (laisser vide = branche configurée du tenant)"
        required: false
        default: ""
      skip_backup:
        description: "Passer le backup pré-déploiement"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_migrations:
        description: "Passer les migrations"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy:
    name: "Deploy ${{ inputs.tenant_code || 'all tenants' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "📋 Afficher les paramètres"
        run: |
          echo "==========================================="
          echo "  KLASSCI — Déploiement tenant (webhook)"
          echo "==========================================="
          echo "  Tenant     : ${{ inputs.tenant_code || '(tous les tenants actifs)' }}"
          echo "  Branche    : ${{ inputs.branch || '(branche configurée du tenant)' }}"
          echo "  Skip backup: ${{ inputs.skip_backup }}"
          echo "  Skip migr. : ${{ inputs.skip_migrations }}"
          echo "  Déclenché par: ${{ github.actor }}"
          echo "  Date       : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "==========================================="

      - name: "🚀 Appeler le webhook de déploiement"
        run: |
          # Construire le payload JSON
          PAYLOAD=$(cat <<EOF
          {
            "tenant_code": "${{ inputs.tenant_code }}",
            "branch": "${{ inputs.branch }}",
            "skip_backup": ${{ inputs.skip_backup }},
            "skip_migrations": ${{ inputs.skip_migrations }}
          }
          EOF
          )

          echo "Envoi du webhook vers ${{ secrets.DEPLOY_WEBHOOK_URL }}..."
          echo "---"

          RESPONSE=$(curl --silent --show-error \
            --max-time 30 \
            --retry 2 \
            --retry-delay 3 \
            -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Actor: ${{ github.actor }}" \
            -H "X-GitHub-Run-ID: ${{ github.run_id }}" \
            -d "$PAYLOAD" \
            -w "\n%{http_code}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Réponse HTTP: $HTTP_CODE"
          echo "Corps: $BODY"
          echo "---"

          # Vérifier le code HTTP (202 = Accepted = mis en file d'attente)
          if [ "$HTTP_CODE" != "202" ]; then
            echo "❌ Le webhook a retourné HTTP $HTTP_CODE (attendu 202)"
            exit 1
          fi

          echo "✅ Déploiement mis en file d'attente avec succès !"

      - name: "✅ Déploiement déclenché"
        if: success()
        run: |
          echo ""
          echo "==========================================="
          echo "  ✅ Déploiement mis en file d'attente !"
          echo "  Le déploiement s'exécute en arrière-plan."
          echo "  Voir les détails dans KLASSCI Master :"
          echo "  https://admin.klassci.com/admin/tenant-deployments"
          echo "==========================================="

      - name: "❌ Déclenchement échoué"
        if: failure()
        run: |
          echo ""
          echo "==========================================="
          echo "  ❌ Impossible de déclencher le déploiement."
          echo "  Vérifiez que DEPLOY_WEBHOOK_URL et DEPLOY_WEBHOOK_TOKEN"
          echo "  sont correctement configurés dans les secrets GitHub."
          echo "==========================================="
